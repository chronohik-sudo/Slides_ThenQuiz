<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMOS HSE Safety Induction</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 16px;
  width: 90%;
  max-width: 1000px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
  color: #2c5364;
}


.slide-wrapper {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  height: 0;
  border-radius: 12px;
  overflow: hidden;
  background: black;
  margin-bottom: 20px;
}

.slide-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

button {
  padding: 12px 24px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}


.btn-start {
  background: gray;
  color: white;
  cursor: not-allowed;
}

.btn-start.enabled {
  background: #28a745;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>DMOS HSE Safety Induction Slides</h1>
<p id="timerText">Please review the slides before proceeding...</p>

<div class="slide-wrapper">
  <iframe id="slideFrame"
    src="https://dmostechnologies1-my.sharepoint.com/personal/embran_dmostechnologies_com/_layouts/15/Doc.aspx?sourcedoc={b4348ed5-2a5a-4214-99e1-d298ed841dc8}&action=embedview&wdAr=1.7777777777777777"
    allowfullscreen>
  </iframe>
</div>

<button id="startBtn" class="btn-start" disabled onclick="startQuiz()">
  Start Quiz (60)
</button>

</div>

<script>
let timeLeft = 180; // ⏱ REQUIRED viewing time (seconds)
const timerText = document.getElementById("timerText");
const startBtn = document.getElementById("startBtn");

const timer = setInterval(() => {
  timeLeft--;

  startBtn.innerText = `Start Quiz (${timeLeft})`;

  if (timeLeft <= 0) {
    clearInterval(timer);

    startBtn.disabled = false;
    startBtn.classList.add("enabled");
    startBtn.innerText = "Start Quiz";

    timerText.innerText = "You may now proceed to the quiz.";
  }
}, 1000);

function startQuiz() {
  const quizzes = [
    "https://forms.office.com/r/XRkmibFvHQ",
    "https://forms.office.com/r/Dpnbz24J9s",
    "https://forms.office.com/r/u6RECy8yxg"
  ];

  const randomIndex = Math.floor(Math.random() * quizzes.length);
  window.location.href = quizzes[randomIndex];
}

</script>

</body>
</html>
